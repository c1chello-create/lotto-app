<div class="card">
<b>기준번호 입력</b>
<p class="guide">2개~6개 번호를 입력하면, 해당 번호가 함께 포함된 회차를 샘플링하고 그 샘플 안에서 2계열·3계열·AI 자동탐색·동반출현 번호군을 분석합니다.</p>

<div class="rowbtn"><button class="mode-btn active" data-mode="series2">2계열</button><button class="mode-btn" data-mode="series3">3계열</button><button class="mode-btn" data-mode="auto">AI 자동탐색</button></div>

<script>
let lottoData=[], sampleLimit=50, analysisMode='series2';
function $(id){return document.getElementById(id)}
function colorClass(n){n=Number(n);if(n<=9)return'yellow';if(n<=19)return'blue';if(n<=29)return'red';if(n<=39)return'black';return'green'}
function ball(n,small=false,extra=''){return `<span class="ball ${small?'small-ball':''} ${extra} ${colorClass(n)}">${n}</span>`}
function parseNums(){const nums=[...new Set(($('patternInput').value||'').replaceAll(',',' ').split(/\s+/).map(Number).filter(n=>Number.isInteger(n)&&n>=1&&n<=45))].sort((a,b)=>a-b);if(nums.length<2||nums.length>6){alert('2개~6개 번호를 입력하세요.');return null}return nums}
function includeBonus(){return $('includeBonusPattern')?$('includeBonusPattern').checked:true}
function pool(row){return includeBonus()?[...(row.numbers||[]),row.bonus]:[...(row.numbers||[])]}
function hitCount(row,nums){const p=pool(row);return nums.filter(n=>p.includes(n)).length}
function minHit(nums){if(nums.length>=5)return 3;if(nums.length===4)return 3;return nums.length}
function getSampleRows(nums){const th=minHit(nums);return lottoData.map(row=>({row,hit:hitCount(row,nums)})).filter(x=>x.hit>=th).sort((a,b)=>b.row.round-a.row.round).slice(0,sampleLimit)}
function gapsForSeries(type,len){const max=Math.floor(len/2),a=[];if(type==='series2'){for(let g=2;g<=max;g+=2)a.push(g)}else{for(let g=3;g<=max;g+=3)a.push(g)}return a}
function freqFromIndexedSamples(samples,gaps){const map={};for(let i=1;i<=45;i++)map[i]=0;let checks=0;for(let i=0;i<samples.length;i++){gaps.forEach(g=>{const target=samples[i+g];if(target){checks++;pool(target.row).filter(n=>n>=1&&n<=45).forEach(n=>map[n]++)}})}const freq=Object.entries(map).map(([n,c])=>({n:Number(n),count:c})).filter(x=>x.count>0).sort((a,b)=>b.count-a.count||a.n-b.n);return{gaps,checks,freq,top:freq.slice(0,10)}}
function analyzeAuto(samples){const out=[];for(let step=2;step<=10;step++){const gaps=[];for(let g=step;g<=Math.floor(samples.length/2);g+=step)gaps.push(g);if(!gaps.length)continue;const p=freqFromIndexedSamples(samples,gaps);const topSum=p.top.slice(0,6).reduce((s,x)=>s+x.count,0);const concentration=p.checks?topSum/(p.checks*7):0;const unique=p.freq.length||1;const score=Math.round(topSum*1.2+concentration*100-unique*0.15);out.push({...p,step,score,concentration})}return out.sort((a,b)=>b.score-a.score||a.step-b.step)}
function scoreCandidates(patterns){const scores={};patterns.forEach(p=>{const weight=p.step===2?1.15:p.step===3?1.05:1.0;p.freq.forEach((x,idx)=>{scores[x.n]=scores[x.n]||{n:x.n,score:0,sources:[],count:0};const rb=Math.max(1,12-idx);scores[x.n].score+=x.count*weight+rb*0.18;scores[x.n].count+=x.count;if(idx<10)scores[x.n].sources.push(`${p.step||'-'}계열 ${x.count}회`)})});return Object.values(scores).sort((a,b)=>b.score-a.score||a.n-b.n).slice(0,10)}
function pairKey(a,b){return a<b?`${a}-${b}`:`${b}-${a}`}
function tripleKey(a,b,c){return [a,b,c].sort((x,y)=>x-y).join('-')}
function coOccurrenceGroups(samples,patterns){const gaps=[...new Set(patterns.flatMap(p=>p.gaps||[]))].slice(0,12);const pair={},triple={};for(let i=0;i<samples.length;i++){gaps.forEach(g=>{const target=samples[i+g];if(!target)return;const nums=[...new Set(pool(target.row).filter(n=>n>=1&&n<=45))].sort((a,b)=>a-b);for(let a=0;a<nums.length;a++)for(let b=a+1;b<nums.length;b++){const k=pairKey(nums[a],nums[b]);pair[k]=(pair[k]||0)+1}for(let a=0;a<nums.length;a++)for(let b=a+1;b<nums.length;b++)for(let c=b+1;c<nums.length;c++){const k=tripleKey(nums[a],nums[b],nums[c]);triple[k]=(triple[k]||0)+1}})}return{pairs:Object.entries(pair).map(([k,c])=>({nums:k.split('-').map(Number),count:c})).sort((a,b)=>b.count-a.count).slice(0,8),triples:Object.entries(triple).map(([k,c])=>({nums:k.split('-').map(Number),count:c})).sort((a,b)=>b.count-a.count).slice(0,8)}}
function stars(v,max){const p=max?Math.round(v/max*100):0;if(p>=85)return'★★★★★';if(p>=70)return'★★★★☆';if(p>=55)return'★★★☆☆';if(p>=35)return'★★☆☆☆';return'★☆☆☆☆'}
function renderRankList(items,maxVal){return items.length?items.map(c=>`<div class="rank">${ball(c.n,true)}<div><div class="bar"><i style="width:${Math.max(8,Math.round((c.score||c.count)/maxVal*100))}%"></i></div><div class="muted">${stars(c.score||c.count,maxVal)} · ${c.sources?c.sources.slice(0,2).join(' / '):''}</div></div><div class="count">${Math.round(c.score||c.count)}</div></div>`).join(''):'<p class="muted">후보가 부족합니다.</p>'}
function renderPatternBox(title,p){const max=p.top[0]?.count||1;return `<div class="box"><div class="head"><b>${title}</b><span class="badge">${p.checks}개 비교</span></div>${p.top.map(x=>`<div class="rank">${ball(x.n,true)}<div class="bar"><i style="width:${Math.max(8,Math.round(x.count/max*100))}%"></i></div><div class="count">${x.count}회</div></div>`).join('')||'<p class="muted">후보 부족</p>'}</div>`}
function renderGroups(groups){const pm=groups.pairs[0]?.count||1,tm=groups.triples[0]?.count||1;return `<div class="card"><b>동반출현 번호군</b><p class="guide">샘플 내부 간격 회차에서 함께 반복된 2개/3개 번호 묶음입니다.</p><div class="group"><div class="group-title">2번호군 TOP</div>${groups.pairs.map(g=>`<div class="rank"><div class="balls">${g.nums.map(n=>ball(n,true)).join('')}</div><div class="bar"><i style="width:${Math.max(8,Math.round(g.count/pm*100))}%"></i></div><div class="count">${g.count}회</div></div>`).join('')||'<p class="muted">번호군 부족</p>'}</div><div class="group"><div class="group-title">3번호군 TOP</div>${groups.triples.map(g=>`<div class="rank"><div class="balls">${g.nums.map(n=>ball(n,true)).join('')}</div><div class="bar"><i style="width:${Math.max(8,Math.round(g.count/tm*100))}%"></i></div><div class="count">${g.count}회</div></div>`).join('')||'<p class="muted">번호군 부족</p>'}</div></div>`}
function renderSamples(samples){return samples.slice(0,8).map((x,idx)=>`<div class="sample"><div class="sample-head"><b>${idx+1}. ${x.row.round}회 · ${x.hit}개 포함</b><span>${x.row.date||''}</span></div><div class="balls">${(x.row.numbers||[]).map(n=>ball(n,true)).join('')}${ball(x.row.bonus,true)}</div></div>`).join('')}

function replayRateForCandidates(samples,candidates,mode){
 const picks=candidates.slice(0,6).map(x=>x.n);
 if(!picks.length)return [];
 const gaps = mode==='series3' ? gapsForSeries('series3',samples.length) : gapsForSeries('series2',samples.length);
 const out=[];
 gaps.slice(0,12).forEach(g=>{
   let checks=0, hits=0, hitNums={};
   picks.forEach(n=>hitNums[n]=0);
   for(let i=0;i<samples.length;i++){
     const target=samples[i+g];
     if(!target)continue;
     checks++;
     const p=pool(target.row);
     const local=picks.filter(n=>p.includes(n));
     if(local.length){
       hits++;
       local.forEach(n=>hitNums[n]++);
     }
   }
   const rate=checks?Math.round(hits/checks*100):0;
   out.push({gap:g,checks,hits,rate,hitNums});
 });
 return out.sort((a,b)=>b.rate-a.rate||b.hits-a.hits||a.gap-b.gap);
}
function renderReplayRate(samples,candidates,mode){
 const rates=replayRateForCandidates(samples,candidates,mode);
 const top=rates.slice(0,6);
 if(!top.length)return '<div class="card"><b>패턴 재현율</b><p class="muted">재현율을 계산할 후보가 부족합니다.</p></div>';
 const best=top[0];
 return `<div class="card">
   <b>패턴 재현율</b>
   <p class="guide">패턴 후보가 샘플 내부의 특정 간격에서 다시 나타난 비율입니다. 높을수록 해당 간격의 반복성이 강합니다.</p>
   <div class="replay-card">
     <b>최고 재현 간격: 직전 ${best.gap}칸</b>
     <p class="muted">${best.checks}개 비교 중 ${best.hits}개 재현 · 재현율 ${best.rate}%</p>
     <div class="bar"><i style="width:${Math.max(8,best.rate)}%"></i></div>
   </div>
   <div class="replay-grid">
     ${top.slice(0,6).map(r=>`<div><b>${r.rate}%</b><span>직전 ${r.gap}칸<br>${r.hits}/${r.checks}</span></div>`).join('')}
   </div>
 </div>`;
}
function buildFlowChains(samples,patterns){
 const gaps=[...new Set(patterns.flatMap(p=>p.gaps||[]))].slice(0,10);
 const chains={};
 for(let i=0;i<samples.length;i++){
   gaps.forEach(g=>{
     const a=samples[i], b=samples[i+g], c=samples[i+g*2];
     if(!a||!b||!c)return;
     const aTop=pool(a.row).filter(n=>n>=1&&n<=45);
     const bTop=pool(b.row).filter(n=>n>=1&&n<=45);
     const cTop=pool(c.row).filter(n=>n>=1&&n<=45);
     aTop.forEach(x=>{
       bTop.forEach(y=>{
         cTop.forEach(z=>{
           if(x===y&&y===z)return;
           const key=`${x}-${y}-${z}`;
           chains[key]=(chains[key]||0)+1;
         });
       });
     });
   });
 }
 return Object.entries(chains)
   .map(([k,c])=>({nums:k.split('-').map(Number),count:c}))
   .filter(x=>x.count>=2)
   .sort((a,b)=>b.count-a.count||a.nums[0]-b.nums[0])
   .slice(0,10);
}
function renderFlowChains(samples,patterns){
 const flows=buildFlowChains(samples,patterns);
 const max=flows[0]?.count||1;
 return `<div class="card">
   <b>흐름분석 · Dream Chain TOP</b>
   <p class="guide">샘플 내부 간격에서 반복된 3단계 번호 흐름입니다. 예: A → B → C 형태로 나타난 반복 후보입니다.</p>
   ${flows.length?flows.map(f=>`
     <div class="flow-card">
       <div class="flow-line">
         ${ball(f.nums[0],true)}<span class="arrow">→</span>${ball(f.nums[1],true)}<span class="arrow">→</span>${ball(f.nums[2],true)}
         <span class="badge">${f.count}회</span>
       </div>
       <div class="bar" style="margin-top:8px"><i style="width:${Math.max(8,Math.round(f.count/max*100))}%"></i></div>
     </div>`).join(''):'<p class="muted">반복 흐름 후보가 부족합니다.</p>'}
 </div>`;
}
function renderAiScorePreview(candidates,groups,samples,mode){
 const top=candidates.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);
 const pairStrong=groups.pairs?.[0]?.count||0;
 const replay=replayRateForCandidates(samples,candidates,mode)[0]?.rate||0;
 const flowCount=buildFlowChains(samples, mode==='series3'?[freqFromIndexedSamples(samples,gapsForSeries('series3',samples.length))]:[freqFromIndexedSamples(samples,gapsForSeries('series2',samples.length))]).length;
 let grade='B';
 if(replay>=70 && pairStrong>=10) grade='S';
 else if(replay>=55 || pairStrong>=8) grade='A';
 return `<div class="card">
   <b>AI Score 연동 미리보기</b>
   <p class="guide">현재 패턴 결과를 AI Score Card에 연결할 때 사용할 수 있는 예비 항목입니다.</p>
   <div class="ai">
     <b>${grade}등급 후보</b>
     <p class="muted">패턴성 ${replay}% · 번호군 강도 ${pairStrong}회 · 흐름 후보 ${flowCount}개</p>
     <div class="balls">${top.map(n=>ball(n,false,'selected-ball')).join('')}</div>
   </div>
 </div>`;
}


function replayRateForCandidates(samples,candidates,mode){
 const picks=candidates.slice(0,6).map(x=>x.n);
 if(!picks.length)return [];
 const gaps = mode==='series3' ? gapsForSeries('series3',samples.length) : gapsForSeries('series2',samples.length);
 const out=[];
 gaps.slice(0,12).forEach(g=>{
   let checks=0,hits=0,hitNums={};
   picks.forEach(n=>hitNums[n]=0);
   for(let i=0;i<samples.length;i++){
     const target=samples[i+g];
     if(!target)continue;
     checks++;
     const p=pool(target.row);
     const local=picks.filter(n=>p.includes(n));
     if(local.length){
       hits++;
       local.forEach(n=>hitNums[n]++);
     }
   }
   const rate=checks?Math.round(hits/checks*100):0;
   const topNums=Object.entries(hitNums).map(([n,c])=>({n:Number(n),count:c})).filter(x=>x.count>0).sort((a,b)=>b.count-a.count||a.n-b.n);
   out.push({gap:g,checks,hits,rate,topNums});
 });
 return out.sort((a,b)=>b.rate-a.rate||b.hits-a.hits||a.gap-b.gap);
}

function patternAiScoreDetail(candidates,groups,samples,mode){
 const rates=replayRateForCandidates(samples,candidates,mode);
 const bestReplay=rates[0]||{rate:0,hits:0,checks:0,topNums:[]};
 const basePattern = mode==='series3'
   ? freqFromIndexedSamples(samples,gapsForSeries('series3',samples.length))
   : freqFromIndexedSamples(samples,gapsForSeries('series2',samples.length));
 const flows=buildFlowChains(samples,[basePattern]);
 const pairStrong=groups.pairs?.[0]?.count||0;
 const tripleStrong=groups.triples?.[0]?.count||0;
 const patternBase=Math.min(40, Math.round(candidates[0]?.score||0));
 const replayScore=Math.min(25, Math.round(bestReplay.rate*0.25));
 const groupScore=Math.min(20, Math.round(pairStrong*0.9 + tripleStrong*0.45));
 const flowScore=Math.min(15, Math.round((flows[0]?.count||0)*0.8 + flows.length*0.3));
 const total=Math.min(100, patternBase+replayScore+groupScore+flowScore);
 let grade='C';
 if(total>=90) grade='S';
 else if(total>=80) grade='A';
 else if(total>=65) grade='B';
 const all={};
 candidates.slice(0,6).forEach(x=>all[x.n]=(all[x.n]||0)+3);
 bestReplay.topNums.slice(0,6).forEach(x=>all[x.n]=(all[x.n]||0)+4);
 [...(groups.pairs?.[0]?.nums||[]),...(groups.triples?.[0]?.nums||[])].forEach(n=>all[n]=(all[n]||0)+2);
 flows.slice(0,3).forEach(f=>f.nums.forEach(n=>all[n]=(all[n]||0)+1));
 const perNumber=Object.entries(all).map(([n,s])=>({n:Number(n),score:s})).sort((a,b)=>b.score-a.score||a.n-b.n).slice(0,10);
 const final=perNumber.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);
 return {total,grade,patternBase,replayScore,groupScore,flowScore,final,perNumber};
}

function getDreamChainBoostData(samples,candidates,groups,mode){
 const rates=replayRateForCandidates(samples,candidates,mode);
 const replayNums = (rates[0]?.topNums || []).slice(0,8).map(x=>({n:x.n,count:x.count,type:'재현'}));

 const basePattern = mode==='series3'
   ? freqFromIndexedSamples(samples,gapsForSeries('series3',samples.length))
   : freqFromIndexedSamples(samples,gapsForSeries('series2',samples.length));

 const flows = buildFlowChains(samples,[basePattern]).slice(0,10);
 const flowMap = {};
 flows.forEach(f=>{
   f.nums.forEach(n=>{
     flowMap[n] = (flowMap[n] || 0) + f.count;
   });
 });
 const flowNums = Object.entries(flowMap).map(([n,c])=>({n:Number(n),count:c,type:'흐름'})).sort((a,b)=>b.count-a.count||a.n-b.n).slice(0,8);

 const groupMap = {};
 (groups.pairs||[]).slice(0,5).forEach(g=>g.nums.forEach(n=>groupMap[n]=(groupMap[n]||0)+g.count));
 (groups.triples||[]).slice(0,5).forEach(g=>g.nums.forEach(n=>groupMap[n]=(groupMap[n]||0)+g.count));
 const groupNums = Object.entries(groupMap).map(([n,c])=>({n:Number(n),count:c,type:'번호군'})).sort((a,b)=>b.count-a.count||a.n-b.n).slice(0,8);

 const score = {};
 candidates.slice(0,8).forEach(x=>score[x.n]=(score[x.n]||0)+3);
 replayNums.forEach(x=>score[x.n]=(score[x.n]||0)+4);
 flowNums.forEach(x=>score[x.n]=(score[x.n]||0)+4);
 groupNums.forEach(x=>score[x.n]=(score[x.n]||0)+2);

 const merged = Object.entries(score).map(([n,s])=>{
   n=Number(n);
   const tags=[];
   if(candidates.slice(0,8).some(x=>x.n===n)) tags.push('패턴');
   if(replayNums.some(x=>x.n===n)) tags.push('재현');
   if(flowNums.some(x=>x.n===n)) tags.push('흐름');
   if(groupNums.some(x=>x.n===n)) tags.push('번호군');
   return {n,score:s,tags};
 }).sort((a,b)=>b.score-a.score||a.n-b.n);

 return {
   replayNums,
   flowNums,
   groupNums,
   merged,
   chainPick: merged.slice(0,6).map(x=>x.n).sort((a,b)=>a-b),
   flows
 };
}

function ballBoostClass(n,boost){
 const item = boost.merged.find(x=>x.n===n);
 if(!item) return '';
 const hasReplay=item.tags.includes('재현');
 const hasFlow=item.tags.includes('흐름');
 if(hasReplay && hasFlow) return 'both-num';
 if(hasReplay) return 'replay-num';
 if(hasFlow) return 'flow-num';
 return 'selected-ball';
}

         <div class="count">${x.count}회</div>
       </div>`).join('') || '<p class="muted">재현번호 부족</p>'}
   </div>

   <div class="dream-chain-boost">
     <b>흐름번호 TOP</b>
     ${boost.flowNums.slice(0,6).map(x=>`
       <div class="boost-row">
         ${ball(x.n,true,'flow-num')}

       </div>`).join('') || '<p class="muted">흐름번호 부족</p>'}
   </div>

   <div class="dream-chain-boost">
     <b>번호별 Dream Chain 반영도</b>
     ${boost.merged.slice(0,10).map(x=>`
       <div class="boost-row">
         ${ball(x.n,true,ballBoostClass(x.n,boost))}
         <div>
           <div class="bar"><i style="width:${Math.max(8,Math.round(x.score/max*100))}%"></i></div>
           <div class="muted">${x.tags.map(t=>`<span class="boost-tag">${t}</span>`).join('')}</div>
         </div>
         <div class="count">${x.score}</div>
       </div>`).join('')}
   </div>
 </div>`;
}

function renderResult(nums){const samples=getSampleRows(nums);const p2=freqFromIndexedSamples(samples,gapsForSeries('series2',samples.length));p2.step=2;const p3=freqFromIndexedSamples(samples,gapsForSeries('series3',samples.length));p3.step=3;const auto=analyzeAuto(samples);const autoBest=auto[0]||p2;const active=analysisMode==='series2'?[p2]:analysisMode==='series3'?[p3]:auto.slice(0,3);const candidates=scoreCandidates(active);const groups=coOccurrenceGroups(samples,active);const maxScore=candidates[0]?.score||1;const pick=candidates.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);const judgeTitle=analysisMode==='auto'?'AI 자동탐색':'선택 계열 분석';const judgeDesc=analysisMode==='auto'?`${autoBest.step}계열이 현재 샘플에서 가장 높은 반복 점수를 보였습니다.`:`${analysisMode==='series2'?'2계열':'3계열'} 간격 기준으로 샘플 내부 반복 패턴을 분석했습니다.`;$('patternResult').innerHTML=`<div class="card"><b>동반패턴 분석 요약</b><div class="balls" style="margin-top:10px">${nums.map(n=>ball(n)).join('')}</div><div class="metric"><div><b>${samples.length}</b><span>샘플 회차</span></div><div><b>${minHit(nums)}개+</b><span>포함 조건</span></div><div><b>${includeBonus()?'포함':'제외'}</b><span>보너스</span></div></div><div class="ai"><b>${judgeTitle}</b><p class="muted">${judgeDesc}</p><p class="muted">패턴 후보</p><div class="balls">${pick.map(n=>ball(n,false,'selected-ball')).join('')}</div></div></div><div class="title">패턴 후보 TOP</div><div class="card">${renderRankList(candidates,maxScore)}</div><div class="title">간격별 분석</div><div class="card">${renderPatternBox('2계열: 2·4·6·8 ...',p2)}${renderPatternBox('3계열: 3·6·9·12 ...',p3)}${analysisMode==='auto'?`<div class="box"><div class="head"><b>AI 자동탐색 TOP</b><span class="badge">${autoBest.step||'-'}계열 우선</span></div>${auto.slice(0,5).map(a=>`<p class="muted"><b>${a.step}계열</b> · 점수 ${a.score} · 비교 ${a.checks}개 · 집중도 ${Math.round(a.concentration*100)}%</p>`).join('')}</div>`:''}</div><div class="title">동반출현 번호군</div>${renderGroups(groups)}<div class="title">패턴 재현율</div>${renderReplayRate(samples,candidates,analysisMode)}<div class="title">흐름분석</div>${renderFlowChains(samples,active)}<div class="title">Dream Chain 반영</div>${renderDreamChainBoost(samples,candidates,groups,analysisMode)}<div class="title">AI Score 연동</div>${renderAiScorePreview(candidates,groups,samples,analysisMode)}<div class="title">샘플 회차 확인</div><div class="card"><p class="guide">동반번호가 확인된 최신 샘플 일부입니다.</p>${renderSamples(samples)}</div>`}
async function loadData(){try{const res=await fetch('./data/lotto.json?ts='+Date.now());const data=await res.json();lottoData=data.sort((a,b)=>b.round-a.round);$('patternStatus').textContent=`전체 ${lottoData.length}개 회차 데이터를 불러왔습니다.`;const saved=JSON.parse(localStorage.getItem('haengun_my_nums')||'null');if(Array.isArray(saved)&&saved.length>=2)$('patternInput').value=saved.slice(0,6).join(' ')}catch(e){console.error(e);$('patternStatus').textContent='데이터 오류: data/lotto.json을 읽지 못했습니다.'}}

<script>
/* v0.6 Final → combo.html 연동 저장 패치 */
(function(){
  if(window.__patternEngineResultSaverBound)return;
  window.__patternEngineResultSaverBound=true;

  const baseRenderResult = window.renderResult || renderResult;
  window.renderResult = renderResult = function(nums){
    baseRenderResult(nums);

    try{
      const samples=getSampleRows(nums);
      const p2=freqFromIndexedSamples(samples,gapsForSeries('series2',samples.length)); p2.step=2;
      const p3=freqFromIndexedSamples(samples,gapsForSeries('series3',samples.length)); p3.step=3;
      const auto=analyzeAuto(samples);
      const active=analysisMode==='series2'?[p2]:analysisMode==='series3'?[p3]:auto.slice(0,3);
      const candidates=scoreCandidates(active);
      const groups=coOccurrenceGroups(samples,active);
      const detail=patternAiScoreDetail(candidates,groups,samples,analysisMode);
      const boost=getDreamChainBoostData(samples,candidates,groups,analysisMode);
      const rates=replayRateForCandidates(samples,candidates,analysisMode);
      const bestReplay=rates[0] || {rate:0,hits:0,checks:0,topNums:[]};
      const flows=buildFlowChains(samples,active);
      const mode = analysisMode==='series2'?'2계열':analysisMode==='series3'?'3계열':'AI 자동탐색';
      const topNumbers=(detail.final||[]).slice(0,6).sort((a,b)=>a-b);

      const result={
        key: nums.slice().sort((a,b)=>a-b).join(','),
        pattern: Math.min(100,Math.round((detail.patternBase||0)*2.5)),
        replay: Math.min(100,Math.round((detail.replayScore||0)*4)),
        flow: Math.min(100,Math.round((detail.flowScore||0)*6.67)),
        dream: Math.min(100,Math.round(detail.total||0)),
        confidence: Math.min(98,Math.max(55,Math.round((detail.total||0)*0.65 + (bestReplay.rate||0)*0.25))),
        mode,
        sampleCount:samples.length,
        repeatRate:bestReplay.rate||0,
        keepCount:boost.chainPick ? boost.chainPick.filter(n=>nums.includes(n)).length : 0,
        inputCount:nums.length,
        topNumbers,
        replayTop:bestReplay.topNums||[],
        chains:flows.slice(0,3),
        reasons:{
          pattern:`${samples.length}개 샘플 · ${mode} · 패턴 후보 ${topNumbers.join(', ')}`,
          replay:`${bestReplay.hits||0}/${bestReplay.checks||0} 재현 · 재현율 ${bestReplay.rate||0}%`,
          flow:flows.length?`최고 흐름 ${flows[0].nums.join('→')} · ${flows[0].count}회`:'반복 흐름 후보 부족',
          dream:`Dream Chain 강화 후보 ${boost.chainPick ? boost.chainPick.join(', ') : '-'}`
        }
      };

      localStorage.setItem('pattern_engine_result',JSON.stringify(result));
    }catch(e){
      console.warn('pattern_engine_result 저장 실패',e);
    }
  };
})();
</script>
