name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 6"

permissions:
  contents: write

jobs:
  update-lotto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build lotto data
        run: python scripts/update_lotto.py

      - name: Commit lotto.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/lotto.json
          git commit -m "Update lotto data" || echo "No changes"
          git push
